<style>

:root{
  --primary:#2563eb;--primary-light:#dbeafe;--primary-dark:#1e40af;
  --accent:#059669;--danger:#dc2626;--warning:#d97706;
  --bg:#f8fafc;--surface:#ffffff;--text:#1e293b;--text-secondary:#64748b;
  --border:#e2e8f0;
  --shadow:0 4px 6px -1px rgba(0,0,0,0.05),0 2px 4px -2px rgba(0,0,0,0.05);
  --shadow-lg:0 10px 15px -3px rgba(0,0,0,0.08),0 4px 6px -4px rgba(0,0,0,0.08);
  --radius:8px;--radius-lg:12px;--sidebar-width:280px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans SC',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.7;font-size:15px}
a{color:var(--primary);text-decoration:none}a:hover{text-decoration:underline}
.layout{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar-width);background:var(--surface);border-right:1px solid var(--border);position:fixed;height:100vh;overflow-y:auto;z-index:50;transition:transform .3s}
.sidebar-header{padding:20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:10}
.sidebar-header h1{font-size:16px;font-weight:700;color:var(--primary-dark);margin-bottom:4px}
.sidebar-header p{font-size:12px;color:var(--text-secondary)}
.nav-tree{padding:12px}
.nav-group{margin-bottom:4px}
.nav-toggle{display:flex;align-items:center;gap:6px;padding:8px 10px;border-radius:var(--radius);cursor:pointer;font-size:14px;font-weight:500;color:var(--text);user-select:none;transition:background .15s}
.nav-toggle:hover{background:var(--primary-light)}
.nav-toggle .arrow{width:16px;height:16px;display:flex;align-items:center;justify-content:center;transition:transform .2s;font-size:11px;color:var(--text-secondary)}
.nav-toggle.collapsed .arrow{transform:rotate(-90deg)}
.nav-children{margin-left:20px;border-left:2px solid var(--border);padding-left:8px;overflow:hidden;transition:max-height .3s}
.nav-children.collapsed{max-height:0}
.nav-link{display:block;padding:6px 10px;border-radius:var(--radius);font-size:13px;color:var(--text-secondary);transition:all .15s}
.nav-link:hover{background:var(--primary-light);color:var(--primary-dark)}
.nav-link.active{background:var(--primary);color:#fff;font-weight:500}
.main{margin-left:var(--sidebar-width);flex:1;min-width:0}
.breadcrumb{position:sticky;top:0;background:rgba(248,250,252,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:12px 32px;font-size:13px;color:var(--text-secondary);z-index:40}
.breadcrumb a{color:var(--text-secondary)}.breadcrumb a:hover{color:var(--primary)}.breadcrumb-sep{margin:0 8px;opacity:.5}
.content{max-width:1000px;margin:0 auto;padding:32px}
.content h1{font-size:32px;font-weight:700;margin-bottom:8px;color:var(--text);letter-spacing:-.02em}
.content .subtitle{font-size:14px;color:var(--text-secondary);margin-bottom:32px}
.content h2{font-size:22px;font-weight:700;margin:40px 0 16px;padding-bottom:8px;border-bottom:2px solid var(--primary-light);color:var(--primary-dark)}
.content h3{font-size:18px;font-weight:600;margin:28px 0 12px;color:var(--text)}
.content h4{font-size:15px;font-weight:600;margin:20px 0 10px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.02em}
.content p{margin-bottom:14px}
.content ul,.content ol{margin:12px 0 12px 22px}
.content li{margin-bottom:6px}
.content blockquote{border-left:4px solid var(--primary);padding:12px 16px;background:var(--primary-light);border-radius:0 var(--radius) var(--radius) 0;margin:16px 0;font-size:14px}
.content code{background:#f1f5f9;padding:2px 6px;border-radius:4px;font-family:'SF Mono',monospace;font-size:13px;color:var(--primary-dark)}
.content pre{background:#1e293b;color:#e2e8f0;padding:16px;border-radius:var(--radius);overflow-x:auto;font-size:13px;line-height:1.6;margin:16px 0}
.content pre code{background:transparent;padding:0;color:inherit}

/* Image blocks */
.img-block{margin:20px auto;text-align:center;max-width:680px}
.img-block img{max-width:100%;max-height:240px;width:auto;border-radius:var(--radius);box-shadow:var(--shadow-lg);border:1px solid var(--border);cursor:zoom-in;transition:transform .2s}
.img-block img:hover{transform:scale(1.02)}
.img-caption{font-size:13px;color:var(--text-secondary);margin-top:8px;font-style:italic}
.img-placeholder{display:flex;align-items:center;justify-content:center;min-height:200px;background:linear-gradient(135deg,#f1f5f9 0%,#e2e8f0 100%);border-radius:var(--radius);border:2px dashed var(--border);color:var(--text-secondary);font-size:14px;padding:24px}

/* Image row layout */
.img-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:20px 0}
.img-row .img-block{margin:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;display:flex;flex-direction:column;align-items:center;justify-content:space-between}
.img-row .img-block .img-pic{width:100%;height:200px;display:flex;align-items:center;justify-content:center;background:#f1f5f9;border-radius:4px;overflow:hidden}
.img-row .img-block .img-pic img{max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain;border-radius:4px;box-shadow:0 0 0 1px var(--border);border:none;cursor:zoom-in}
.img-row .img-block .img-caption{margin-top:10px;font-size:12px;line-height:1.5;color:var(--text-secondary);font-style:italic;text-align:center}
.img-row-2{grid-template-columns:repeat(2,1fr);max-width:66%;margin-left:auto;margin-right:auto}
@media (max-width:768px){
  .img-row{grid-template-columns:1fr}
  .img-row-2{grid-template-columns:1fr;max-width:100%}
}

/* Image zoom overlay */
.img-zoom-overlay{position:fixed;inset:0;background:rgba(15,23,42,.85);z-index:999;backdrop-filter:blur(4px);cursor:zoom-out;display:flex;justify-content:center;align-items:center;animation:fadeIn .2s ease}
.img-zoom-overlay img{max-width:90vw;max-height:90vh;object-fit:contain;border-radius:var(--radius);box-shadow:0 25px 50px -12px rgba(0,0,0,.25);cursor:grab;transition:transform .1s ease-out;transform-origin:center center}
.img-zoom-overlay img.is-dragging{cursor:grabbing}
.img-zoom-overlay::after{content:'滚轮缩放 / 拖拽平移 / 点击关闭';position:absolute;bottom:16px;left:50%;transform:translateX(-50%);font-size:13px;color:#fff;background:rgba(15,23,42,0.7);padding:6px 14px;border-radius:999px;pointer-events:none;white-space:nowrap}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* Tables */
.table-wrap{overflow-x:auto;margin:16px 0;border-radius:var(--radius);box-shadow:var(--shadow);background:var(--surface)}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{padding:12px 16px;text-align:left;border-bottom:1px solid var(--border);vertical-align:top}
th{background:linear-gradient(135deg,var(--primary-dark) 0%,var(--primary) 100%);color:#fff;font-weight:600;position:sticky;top:0;white-space:nowrap}
tr:hover td{background:#f8fafc}
tr:last-child td{border-bottom:none}

/* Architecture diagram block (from docs/5) */
.arch-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin:20px 0;box-shadow:var(--shadow)}
.arch-block h4{margin-top:0;color:var(--primary-dark);font-size:16px;text-transform:none;letter-spacing:normal}
.arch-grid{display:grid;grid-template-columns:140px 1fr;gap:12px 16px;margin-top:16px}
.arch-grid .label{font-weight:600;color:var(--text-secondary);text-align:right;padding-top:2px}
.arch-grid .content{color:var(--text)}

/* Highlight box (from docs/5) */
.highlight-box{background:linear-gradient(135deg,#ecfdf5 0%,#d1fae5 100%);border-left:4px solid var(--accent);padding:14px 18px;border-radius:0 var(--radius) var(--radius) 0;margin:16px 0}
.highlight-box.warn{background:linear-gradient(135deg,#fffbeb 0%,#fef3c7 100%);border-left-color:var(--warning)}
.highlight-box.danger{background:linear-gradient(135deg,#fef2f2 0%,#fee2e2 100%);border-left-color:var(--danger)}

/* Footer nav */
.footer-nav{display:flex;justify-content:space-between;align-items:center;margin-top:48px;padding-top:24px;border-top:2px solid var(--border)}
.footer-nav a{display:flex;align-items:center;gap:8px;padding:12px 20px;border-radius:var(--radius);background:var(--surface);border:1px solid var(--border);font-size:14px;font-weight:500;transition:all .15s}
.footer-nav a:hover{background:var(--primary-light);border-color:var(--primary);text-decoration:none}
.footer-nav .prev{color:var(--text-secondary)}
.footer-nav .next{color:var(--primary)}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#94a3b8}

@media print{.sidebar{display:none}.main{margin-left:0}.breadcrumb{position:static}}
@media (max-width:768px){:root{--sidebar-width:0}.sidebar{transform:translateX(-100%)}.main{margin-left:0}.content{padding:20px}.arch-grid{grid-template-columns:1fr}.arch-grid .label{text-align:left}}

</style>

<script>

// Sidebar toggle
function toggleNav(el){
  el.classList.toggle('collapsed');
  const children = el.nextElementSibling;
  if(children) children.classList.toggle('collapsed');
}

// Image zoom
let imgZoomOverlay = null;
let imgIsDragging = false;
let imgDragStart = null;
let imgDragLast = null;

function updateImgZoomTransform(overlay){
  const img = overlay.querySelector('img');
  if(!img) return;
  const tx = parseFloat(overlay.dataset.tx) || 0;
  const ty = parseFloat(overlay.dataset.ty) || 0;
  const scale = parseFloat(overlay.dataset.scale) || 1;
  img.style.transform = 'translate('+tx+'px,'+ty+'px) scale('+scale+')';
}

document.addEventListener('click', function(e){
  const img = e.target.closest('.img-block img');
  if(img){
    e.preventDefault();
    const overlay = document.createElement('div');
    overlay.className = 'img-zoom-overlay';
    overlay.dataset.scale = '1';
    overlay.dataset.tx = '0';
    overlay.dataset.ty = '0';
    const zoomed = document.createElement('img');
    zoomed.src = img.src;
    zoomed.alt = img.alt;
    zoomed.style.transform = 'translate(0px,0px) scale(1)';
    overlay.appendChild(zoomed);
    document.body.appendChild(overlay);
    imgZoomOverlay = overlay;
    imgIsDragging = false;
    return;
  }
  const overlay = e.target.closest('.img-zoom-overlay');
  if(overlay){
    if(imgIsDragging){
      imgIsDragging = false;
      return;
    }
    overlay.remove();
    if(imgZoomOverlay === overlay) imgZoomOverlay = null;
  }
});

document.addEventListener('wheel', function(e){
  const overlay = e.target.closest('.img-zoom-overlay');
  if(!overlay) return;
  e.preventDefault();
  let scale = parseFloat(overlay.dataset.scale) || 1;
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  scale = Math.max(0.5, Math.min(5, scale * delta));
  overlay.dataset.scale = scale.toFixed(3);
  updateImgZoomTransform(overlay);
}, { passive: false });

document.addEventListener('mousedown', function(e){
  const overlay = e.target.closest('.img-zoom-overlay');
  if(!overlay) return;
  const img = overlay.querySelector('img');
  if(!img) return;
  e.preventDefault();
  imgDragStart = { x: e.clientX, y: e.clientY };
  imgDragLast = { x: e.clientX, y: e.clientY };
  imgZoomOverlay = overlay;
  imgIsDragging = false;
  img.classList.add('is-dragging');
});

document.addEventListener('mousemove', function(e){
  if(!imgDragStart || !imgZoomOverlay) return;
  const dx = e.clientX - imgDragLast.x;
  const dy = e.clientY - imgDragLast.y;
  const movedX = Math.abs(e.clientX - imgDragStart.x);
  const movedY = Math.abs(e.clientY - imgDragStart.y);
  if(movedX > 3 || movedY > 3) imgIsDragging = true;
  imgDragLast = { x: e.clientX, y: e.clientY };
  let tx = parseFloat(imgZoomOverlay.dataset.tx) || 0;
  let ty = parseFloat(imgZoomOverlay.dataset.ty) || 0;
  tx += dx;
  ty += dy;
  imgZoomOverlay.dataset.tx = tx.toFixed(1);
  imgZoomOverlay.dataset.ty = ty.toFixed(1);
  updateImgZoomTransform(imgZoomOverlay);
});

document.addEventListener('mouseup', function(){
  if(imgZoomOverlay){
    const img = imgZoomOverlay.querySelector('img');
    if(img) img.classList.remove('is-dragging');
  }
  imgDragStart = null;
  imgDragLast = null;
});

document.addEventListener('keydown', function(e){
  if(e.key === 'Escape'){
    document.querySelectorAll('.img-zoom-overlay').forEach(el => el.remove());
    imgZoomOverlay = null;
  }
});

</script>
